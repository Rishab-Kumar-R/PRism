name: CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Generate test private key
        run: |
          openssl genrsa 2048 | awk 'NF {sub(/\r/, ""); printf "%s\\n",$0;}' > /tmp/test-key.txt
          KEY=$(cat /tmp/test-key.txt)
          cat > src/main/resources/application-test.yml << EOF
          quarkus:
            github-app:
              app-id: 1
              private-key: "$KEY"
            langchain4j:
              openai:
                api-key: test-api-key
                base-url: https://openrouter.ai/api/v1
                chat-model:
                  model-name: openai/gpt-oss-120b:free
            datasource:
              jdbc:
                url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
            hibernate-orm:
              schema-management:
                strategy: drop-and-create
          app:
            security:
              api-key: test-api-key
          EOF

      - name: Run tests
        run: ./gradlew test

      - name: Build
        run: ./gradlew build -x test
