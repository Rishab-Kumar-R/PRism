quarkus:
  datasource:
    db-kind: postgresql
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    jdbc:
      url: jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}

  hibernate-orm:
    schema-management:
      strategy: update

  http:
    port: 8080

  log:
    level: INFO
    console:
      json: true
    category:
      "dev.rishabkumar":
        level: INFO
      "org.hibernate":
        level: WARN

  smallrye-openapi:
    info-title: PRism API
    info-version: 1.0.0
    info-description: AI-powered GitHub PR review API
