quarkus:
  github-app:
    app-id: ${GITHUB_APP_ID}
    private-key: ${GITHUB_APP_PRIVATE_KEY}

  langchain4j:
    ai-gemini:
      api-key: ${GEMINI_API_KEY}
      model-id: ${GEMINI_MODEL_ID}
      timeout: 60s

  datasource:
    db-kind: h2
    jdbc:
      url: jdbc:h2:file:./data/ai-code-reviewer

  hibernate-orm:
    schema-management:
      strategy: update

app:
  review:
    max-diff-chars: 50000