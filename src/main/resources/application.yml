quarkus:
  github-app:
    app-id: ${GITHUB_APP_ID}
    private-key: ${GITHUB_APP_PRIVATE_KEY}

  langchain4j:
    openai:
      api-key: ${OPENROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      chat-model:
        model-name: ${AI_MODEL_ID}
      timeout: 60s

  datasource:
    db-kind: h2
    jdbc:
      url: jdbc:h2:file:./data/prism

  hibernate-orm:
    schema-management:
      strategy: update

  smallrye-openapi:
    info-title: PRism API
    info-version: 1.0.0
    info-description: AI-powered GitHub PR review API

app:
  security:
    api-key: ${API_KEY}
  review:
    max-diff-chars: 50000
    cooldown-seconds: 60